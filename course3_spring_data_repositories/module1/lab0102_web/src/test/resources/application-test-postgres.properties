#spring.main.web-application-type=none

# Shared JPA configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.enable-lazy-load-no-trans=true

# MySQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/learnquest_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

# Initialize database from scripts
spring.datasource.initialization-mode=never
spring.datasource.schema=classpath:schema-postgres.sql
spring.datasource.data=classpath:data.sql

# Logging
logging.level.org.springframework.jdbc.datasource.init=DEBUG
