# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/learnquest_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# Initialize database from scripts
spring.datasource.initialization-mode=always
spring.datasource.schema=classpath:schema-mysql.sql
spring.datasource.data=classpath:data.sql

# Logging
logging.level.org.springframework.jdbc.datasource.init=DEBUG
